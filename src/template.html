<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Transition</title>
  </head>
  <body>
    <div class="container">
      <div>
        <canvas id="c"></canvas>
      </div>
      <form action="" method="">
        <div class="z-slider">
          <label for="z-slider">Z </label>
          <input type="range" id="z-slider" max="-1" min="-1000" step="0.5" value="-241">
          <output for="z-slider"> </output>
        </div>
        <div class="files">
          <label for="front-image">Front Image </label>
          <input type="file" id="front-image" accept="image/png, image/jpeg">
          <label for="back-image">Back Image </label>
          <input type="file" id="back-image" accept="image/png, image/jpeg">
        </div>
        <div class="width-slider">
          <label for="width">Width</label>
          <input type="range" id="width-slider" max="800" min="0" step="1" value="800" list="dimensions">
          <output for="width-slider"> </output>
        </div>
        <div class="height-slider">
          <label for="height">Height</label>
          <input type="range" id="height-slider" max="500" min="0" step="1" value="500" list="dimensions">
          <output for="height-slider"> </output>
        </div>

        <datalist id="dimensions">
          <option value="0"></option>
          <option value="100"></option>
          <option value="200"></option>
          <option value="300"></option>
          <option value="400"></option>
          <option value="500"></option>
          <option value="600"></option>
          <option value="700"></option>
          <option value="800"></option>
        </datalist>
      </form>
    </div>
  </body>
</html>
